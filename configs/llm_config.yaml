# =============================================================================
# Master LLM Configuration
# =============================================================================
# Select which LLM provider to use for the agents.
# Options: "openai" | "mixtral"
llm_provider: "mixtral"

# API Keys
# Leave empty ("") to fall back on the corresponding environment variable:
#   OpenAI  → OPENAI_API_KEY
#   Mixtral → MISTRAL_API_KEY
openai_api_key: ""
mistral_api_key: ""